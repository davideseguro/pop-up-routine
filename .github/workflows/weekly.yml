name: POP-UP Routine — Wochenlauf

on:
  # Mittwochs 10:00 Uhr Schweiz (Mitteleurop. Sommerzeit = UTC+2; im Winter = UTC+1).
  # Cron auf GitHub laeuft in UTC. Damit wir IMMER um 10:00 Schweizer Zeit laufen,
  # legen wir ZWEI Trigger an: 08:00 UTC (= Sommerzeit) und 09:00 UTC (= Winterzeit).
  # Das Skript prueft selbst, ob es heute ueberhaupt laufen soll (siehe weiter unten).
  schedule:
    - cron: '0 8 * * 3'   # Mittwoch 08:00 UTC = 10:00 CEST (Sommer)
    - cron: '0 9 * * 3'   # Mittwoch 09:00 UTC = 10:00 CET  (Winter)

  # Manuell triggerbar (zum Testen ueber den GitHub-Web-UI Button "Run workflow")
  workflow_dispatch:

jobs:
  run-weekly:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # damit der Workflow baseline.json committen kann

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: DST-Guard (skip falls falscher Trigger fuer aktuelle Zeitzone)
        # Idee: 08:00 UTC laeuft NUR im Sommer; 09:00 UTC laeuft NUR im Winter.
        # Wir bestimmen die aktuelle Schweizer Stunde und brechen ab, wenn != 10.
        # Bei manuellen Lauf (workflow_dispatch) immer durchlaufen.
        if: github.event_name == 'schedule'
        run: |
          set -e
          export TZ='Europe/Zurich'
          local_hour=$(date +%H)
          echo "Aktuelle Schweizer Stunde: $local_hour"
          if [ "$local_hour" != "10" ]; then
            echo "Nicht 10 Uhr Schweizer Zeit - Lauf wird uebersprungen (DST-Guard)."
            echo "skip=true" >> $GITHUB_ENV
          else
            echo "skip=false" >> $GITHUB_ENV
          fi

      - name: Setup Python
        if: env.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        if: env.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        if: env.skip != 'true'
        run: |
          python -m playwright install --with-deps chromium

      - name: Run weekly routine
        if: env.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SMTP_USE_SSL: ${{ secrets.SMTP_USE_SSL }}
        run: |
          python code/run_weekly.py

      - name: Commit updated baseline
        if: env.skip != 'true'
        run: |
          git config user.name 'pop-up-routine-bot'
          git config user.email 'pop-up-routine-bot@users.noreply.github.com'
          git add data/clean/baseline.json data/raw/ output/ data/clean/ || true
          if git diff --staged --quiet; then
            echo "Keine Aenderungen zu committen."
          else
            git commit -m "chore: weekly run $(date -u +%Y-%m-%d)"
            git push
          fi
