name: POP-UP Routine — Wochenlauf

on:
  # Trigger: Externer Scheduler (cron-job.org) via repository_dispatch.
  # Mittwoch 10:00 Schweiz Zeit, konfiguriert auf https://console.cron-job.org/jobs
  # GitHub-Cron wird NICHT verwendet (unzuverlaessig + wuerde zu Doppel-Mails fuehren).
  repository_dispatch:
    types: [weekly-run]

  # Manuell triggerbar (Web-UI Button "Run workflow")
  workflow_dispatch:

jobs:
  run-weekly:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # damit der Workflow baseline.json committen kann

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Run weekly routine
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SMTP_USE_SSL: ${{ secrets.SMTP_USE_SSL }}
        run: |
          python code/run_weekly.py

      - name: Commit updated baseline
        run: |
          git config user.name 'pop-up-routine-bot'
          git config user.email 'pop-up-routine-bot@users.noreply.github.com'
          git add data/clean/baseline.json data/raw/ output/ data/clean/ || true
          if git diff --staged --quiet; then
            echo "Keine Aenderungen zu committen."
          else
            git commit -m "chore: weekly run $(date -u +%Y-%m-%d)"
            git push
          fi
