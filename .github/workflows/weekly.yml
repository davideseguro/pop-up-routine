name: POP-UP Routine — Wochenlauf

on:
  # Ziel: Mittwochs ca. 10:00 Schweizer Zeit.
  # GitHub-Cron laeuft in UTC und ist "best effort" - kann sich um 5-30 Min verzoegern.
  # Strategie: mehrere Trigger als Sicherheitsnetz; ein Lock-File verhindert,
  # dass die Mail mehrmals pro Tag versendet wird.
  schedule:
    # Sommerzeit (CEST = UTC+2): 10:00 Schweiz = 08:00 UTC
    - cron: '5 8 * * 3'    # Mittwoch 08:05 UTC (5 Min Puffer um die volle Stunde)
    - cron: '15 8 * * 3'   # Mittwoch 08:15 UTC (Backup falls 08:05 verzoegert)
    # Winterzeit (CET = UTC+1): 10:00 Schweiz = 09:00 UTC
    - cron: '5 9 * * 3'    # Mittwoch 09:05 UTC
    - cron: '15 9 * * 3'   # Mittwoch 09:15 UTC

  # Manuell triggerbar
  workflow_dispatch:

jobs:
  run-weekly:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # damit der Workflow baseline.json committen kann

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Tages-Lock (verhindert Mehrfach-Versand pro Tag)
        # Wir haben 4 Cron-Trigger fuer Robustheit. Der erste, der durchkommt,
        # erzeugt einen Marker in data/clean/. Alle weiteren Trigger am gleichen
        # Tag sehen den Marker und brechen ab.
        # Bei manuellem Lauf (workflow_dispatch) wird der Lock ignoriert.
        if: github.event_name == 'schedule'
        run: |
          set -e
          export TZ='Europe/Zurich'
          today=$(date +%Y-%m-%d)
          local_hour=$(date +%H)
          echo "Aktuelles Datum (Schweiz): $today, Stunde: $local_hour"

          # Defensive Prueffung: laufen nur wenn lokale Stunde zwischen 8 und 12 Uhr
          # (deckt Verzoegerungen ab, verhindert versehentliche Mitternachts-Laeufe)
          if [ "$local_hour" -lt 8 ] || [ "$local_hour" -gt 12 ]; then
            echo "Zeit ausserhalb Fenster (8-12 Uhr Schweiz). Skip."
            echo "skip=true" >> $GITHUB_ENV
            exit 0
          fi

          # Lock-File pruefen
          lockfile="data/clean/last_run_date.txt"
          if [ -f "$lockfile" ]; then
            last_run=$(cat "$lockfile")
            if [ "$last_run" = "$today" ]; then
              echo "Heute bereits gelaufen ($last_run). Skip."
              echo "skip=true" >> $GITHUB_ENV
              exit 0
            fi
          fi

          echo "skip=false" >> $GITHUB_ENV
          # Lock setzen (wird nur committed wenn der Run durchlaeuft)
          mkdir -p data/clean
          echo "$today" > "$lockfile"

      - name: Setup Python
        if: env.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        if: env.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        if: env.skip != 'true'
        run: |
          python -m playwright install --with-deps chromium

      - name: Run weekly routine
        if: env.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SMTP_USE_SSL: ${{ secrets.SMTP_USE_SSL }}
        run: |
          python code/run_weekly.py

      - name: Commit updated baseline
        if: env.skip != 'true'
        run: |
          git config user.name 'pop-up-routine-bot'
          git config user.email 'pop-up-routine-bot@users.noreply.github.com'
          git add data/clean/baseline.json data/clean/last_run_date.txt data/raw/ output/ data/clean/ || true
          if git diff --staged --quiet; then
            echo "Keine Aenderungen zu committen."
          else
            git commit -m "chore: weekly run $(date -u +%Y-%m-%d)"
            git push
          fi
